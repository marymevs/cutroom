{{define "card_tile_partial.html"}}
<div class="card-tile" data-card-id="{{.ID}}" role="gridcell">
  <div class="card-thumb">
    {{if .ThumbURL}}
    <img src="{{.ThumbURL}}" alt="{{.Name}}" loading="lazy" width="160" height="90">
    {{else}}
    <div class="card-thumb-missing" aria-label="Thumbnail unavailable">?</div>
    {{end}}
  </div>
  <div class="card-meta">
    <div class="card-name" title="{{.Name}}">{{.Name}}</div>
    {{if .Description}}<div class="card-desc" title="{{.Description}}">{{.Description}}</div>{{end}}
    <div class="card-dims">{{.Width}}×{{.Height}}</div>
  </div>
  <button type="button" class="card-delete"
          aria-label="Delete {{.Name}}"
          onclick="deleteCard('{{.ID}}', this)">×</button>
</div>
{{end}}
